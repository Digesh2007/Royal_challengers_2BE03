<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Cluster One</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/hero.css" />
  <style>
    .gallery-section { padding: 4rem 2rem; }
    .gallery-header { text-align: center; margin-bottom: 3rem; }
    .gallery-header h1 { font-size: 2.5rem; margin-bottom: 1rem; color: var(--accent-cyan); }
    .gallery-filters { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .gallery-filter-btn { padding: 0.6rem 1.5rem; border: 2px solid var(--border-color); background: var(--bg-primary); border-radius: 20px; cursor: pointer; transition: all 0.3s; }
    .gallery-filter-btn.active { background: var(--accent-cyan); color: white; border-color: var(--accent-cyan); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
    .gallery-item { position: relative; overflow: hidden; border-radius: 12px; aspect-ratio: 1; cursor: pointer; background: var(--bg-secondary); }
    .gallery-item-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .gallery-item:hover .gallery-item-img { transform: scale(1.1); }
    .gallery-item-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(0, 245, 255, 0.8), rgba(0, 128, 255, 0.8)); opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; padding: 1.5rem; }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }
    .gallery-item-title { color: white; font-weight: 600; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); }
    .modal.show { display: flex; align-items: center; justify-content: center; }
    .modal-content { position: relative; max-width: 90%; max-height: 90vh; background: var(--bg-primary); border-radius: 12px; overflow: hidden; }
    .modal-image { width: 100%; height: auto; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: rgba(0, 0, 0, 0.7); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
  </style>
</head>
<body>
  <header id="header-slot"></header>

  <main>
    <!-- Gallery Hero -->
    <section class="gallery-section" style="background: linear-gradient(135deg, rgba(0, 245, 255, 0.1), rgba(0, 128, 255, 0.1));">
      <div class="gallery-header">
        <h1><i class="fa-solid fa-images"></i> Gallery</h1>
        <p style="font-size: 1.1rem; color: var(--text-secondary);">Capturing Moments of Innovation & Collaboration</p>
      </div>
    </section>

    <!-- Filters -->
    <section class="gallery-section">
      <div style="max-width: 1200px; margin: 0 auto;">
        <div class="gallery-filters">
          <button class="gallery-filter-btn active" onclick="filterGallery('all')">All</button>
          <button class="gallery-filter-btn" onclick="filterGallery('hackathon')">Hackathons</button>
          <button class="gallery-filter-btn" onclick="filterGallery('workshop')">Workshops</button>
          <button class="gallery-filter-btn" onclick="filterGallery('event')">Events</button>
          <button class="gallery-filter-btn" onclick="filterGallery('project')">Projects</button>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="gallery-grid">
          <!-- Items generated by JS -->
        </div>
      </div>
    </section>
  </main>

  <footer id="footer-slot"></footer>

  <!-- Modal -->
  <div id="gallery-modal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeGalleryModal()">✕</button>
      <img id="modal-image" class="modal-image" src="" alt="">
    </div>
  </div>

  <script src="config/club-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const galleryItems = [
      { id: 1, title: 'HackCluster 2024', category: 'hackathon', img: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%2300f5ff%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2248%22 fill=%22%23000%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3EHackCluster 2024%3C/text%3E%3C/svg%3E' },
      { id: 2, title: 'Web Development Workshop', category: 'workshop', img: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%220080ff%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2240%22 fill=%22%23fff%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3EWeb Dev Workshop%3C/text%3E%3C/svg%3E' },
      { id: 3, title: 'AI/ML Talk Series', category: 'event', img: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23ffb700%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2244%22 fill=%22%23000%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3EAI/ML Talk%3C/text%3E%3C/svg%3E' },
      { id: 4, title: 'Student Project Showcase', category: 'project', img: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%2300ff88%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2240%22 fill=%22%23000%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3EProject Showcase%3C/text%3E%3C/svg%3E' },
      { id: 5, title: 'Team Collaboration Session', category: 'event', img: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%23%2300ccff%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2240%22 fill=%22%23000%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3ETeam Session%3C/text%3E%3C/svg%3E' },
      { id: 6, title: 'Cloud Computing Workshop', category: 'workshop', img: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%221a1a2e%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2240%22 fill=%22%2300f5ff%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3ECloud Computing%3C/text%3E%3C/svg%3E' },
      { id: 7, title: 'Coding Competition', category: 'hackathon', img: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23ff006e%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2240%22 fill=%22%23fff%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3ECoding Competition%3C/text%3E%3C/svg%3E' },
      { id: 8, title: 'Open Source Contribution', category: 'project', img: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%233a86ff%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2237%22 fill=%22%23fff%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3EOpen Source%3C/text%3E%3C/svg%3E' },
      { id: 9, title: 'Annual Summit 2024', category: 'event', img: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23fb5607%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2244%22 fill=%22%23fff%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3ESummit 2024%3C/text%3E%3C/svg%3E' }
    ];

    function renderGallery(items) {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = items.map(item => `
        <div class="gallery-item" data-category="${item.category}" onclick="openGalleryModal('${item.img}')">
          <img src="${item.img}" alt="${item.title}" class="gallery-item-img">
          <div class="gallery-item-overlay">
            <div class="gallery-item-title">${item.title}</div>
          </div>
        </div>
      `).join('');
    }

    function filterGallery(category) {
      document.querySelectorAll('.gallery-filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      if (category === 'all') {
        renderGallery(galleryItems);
      } else {
        renderGallery(galleryItems.filter(item => item.category === category));
      }
    }

    function openGalleryModal(img) {
      document.getElementById('gallery-modal').classList.add('show');
      document.getElementById('modal-image').src = img;
    }

    function closeGalleryModal() {
      document.getElementById('gallery-modal').classList.remove('show');
    }

    document.getElementById('gallery-modal').addEventListener('click', (e) => {
      if (e.target.id === 'gallery-modal') closeGalleryModal();
    });

    renderGallery(galleryItems);
  </script>
</body>
</html>
