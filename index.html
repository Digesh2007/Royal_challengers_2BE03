<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cluster One — The premier tech innovation club at S-VYASA Deemed to be University, Bengaluru. Explore. Experience. Excel." />
  <meta name="theme-color" content="#050A14" />
  <meta property="og:title" content="Cluster One — Tech Innovation Club | S-VYASA University" />
  <meta property="og:description" content="Explore. Experience. Excel. Join 85+ members at S-VYASA Deemed to be University, Bengaluru." />
  <title>Cluster One — Tech Innovation Club | S-VYASA University</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTKA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- CSS Files -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/hero.css" />
  <link rel="stylesheet" href="css/college.css" />
  <link rel="stylesheet" href="css/team.css" />
  <link rel="stylesheet" href="css/connect.css" />
  <link rel="stylesheet" href="css/auth-modal.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/print-od.css" />
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen" aria-label="Loading Cluster One" role="status">
    <div class="loading-inner">
      <div class="cluster-spinner">
        <div class="spinner-node node-center"></div>
        <div class="spinner-node node-1"></div>
        <div class="spinner-node node-2"></div>
        <div class="spinner-node node-3"></div>
        <div class="spinner-node node-4"></div>
        <div class="spinner-line line-1"></div>
        <div class="spinner-line line-2"></div>
        <div class="spinner-line line-3"></div>
        <div class="spinner-line line-4"></div>
      </div>
      <p class="loading-text">CLUSTER ONE</p>
      <p class="loading-sub">S-VYASA University · Initializing...</p>
    </div>
  </div>

  <!-- App Root -->
  <div id="app">

    <!-- Header injected here -->
    <div data-component="header"></div>

    <!-- Auth Modal injected here -->
    <div data-component="auth-modal"></div>

    <!-- Main View Container -->
    <main id="main-content">

      <!-- Landing Page View -->
      <div id="view-home" class="view active">
        <div data-component="hero-section"></div>
        <div data-component="college-section"></div>
        <div data-component="team-section"></div>
        <div data-component="connect-section"></div>
        <div data-component="footer"></div>
      </div>

      <!-- Student Dashboard View -->
      <div id="view-dashboard-student" class="view">
        <div data-component="dashboard-nav"></div>
        <div id="student-dashboard-content"></div>
      </div>

      <!-- Coordinator Dashboard View -->
      <div id="view-dashboard-coordinator" class="view">
        <div data-component="dashboard-nav"></div>
        <div id="coordinator-dashboard-content"></div>
      </div>

      <!-- OD Application View -->
      <div id="view-od-apply" class="view">
        <div data-component="dashboard-nav"></div>
        <div id="od-application-content"></div>
      </div>

      <!-- OD Print Template View -->
      <div id="view-od-print" class="view">
        <div id="od-print-content"></div>
      </div>

    </main>

    <!-- Toast Container -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  </div>

  <!-- Config (must load before app.js) -->
  <script src="config/club-config.js"></script>
  <!-- App -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
