<div id="auth-modal" class="auth-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title" aria-hidden="true">
  <div class="auth-card">
    <button id="auth-close-btn" class="auth-close" aria-label="Close login modal">&#10005;</button>
    <div class="auth-logo" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="4" fill="#00F5FF"/>
        <circle cx="6" cy="10" r="3" fill="#00F5FF" opacity="0.7"/>
        <circle cx="30" cy="10" r="3" fill="#00F5FF" opacity="0.7"/>
        <circle cx="6" cy="26" r="3" fill="#FFB700" opacity="0.7"/>
        <circle cx="30" cy="26" r="3" fill="#FFB700" opacity="0.7"/>
        <line x1="18" y1="18" x2="6" y2="10" stroke="#00F5FF" stroke-width="1" opacity="0.5"/>
        <line x1="18" y1="18" x2="30" y2="10" stroke="#00F5FF" stroke-width="1" opacity="0.5"/>
        <line x1="18" y1="18" x2="6" y2="26" stroke="#FFB700" stroke-width="1" opacity="0.5"/>
        <line x1="18" y1="18" x2="30" y2="26" stroke="#FFB700" stroke-width="1" opacity="0.5"/>
      </svg>
      <span id="auth-modal-title" class="auth-logo-text">Cluster<span class="logo-accent">One</span></span>
    </div>
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login">Login</button>
      <button class="auth-tab" id="tab-register" role="tab" aria-selected="false" aria-controls="panel-register">Register</button>
    </div>
    <!-- Login Panel -->
    <div class="auth-panel active" id="panel-login" role="tabpanel">
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="your@email.com" autocomplete="email" required />
          <span class="field-error" id="login-email-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
          <span class="field-error" id="login-password-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-role">Role</label>
          <select id="login-role" class="form-select" required>
            <option value="">Select your role</option>
            <option value="student">Student</option>
            <option value="coordinator">Coordinator</option>
          </select>
          <span class="field-error" id="login-role-error" role="alert"></span>
        </div>
        <div class="form-footer-row">
          <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>
        </div>
        <span class="form-error-global" id="login-error-global" role="alert"></span>
        <button type="submit" class="btn btn-primary btn-full" id="login-submit-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" aria-hidden="true"></span>
        </button>
      </form>
      <div class="demo-section">
        <p class="demo-label">Quick Demo Access</p>
        <div class="demo-buttons">
          <button class="btn btn-ghost btn-sm" id="demo-student-btn">&#128104;&#8205;&#127979; Try as Student</button>
          <button class="btn btn-ghost btn-sm" id="demo-coordinator-btn">&#127979; Try as Coordinator</button>
        </div>
      </div>
    </div>
    <!-- Register Panel -->
    <div class="auth-panel" id="panel-register" role="tabpanel">
      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input type="text" id="reg-name" class="form-input" placeholder="Your full name" required />
          <span class="field-error" id="reg-name-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input type="email" id="reg-email" class="form-input" placeholder="your@email.com" required />
          <span class="field-error" id="reg-email-error" role="alert"></span>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <input type="password" id="reg-password" class="form-input" placeholder="Min 8 chars" required />
            <span class="field-error" id="reg-password-error" role="alert"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-confirm-password">Confirm Password</label>
            <input type="password" id="reg-confirm-password" class="form-input" placeholder="Repeat password" required />
            <span class="field-error" id="reg-confirm-error" role="alert"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-role">Role</label>
          <select id="reg-role" class="form-select" required>
            <option value="">Select your role</option>
            <option value="student">Student</option>
            <option value="coordinator">Coordinator</option>
          </select>
          <span class="field-error" id="reg-role-error" role="alert"></span>
        </div>
        <div class="form-group" id="reg-student-id-group" hidden>
          <label class="form-label" for="reg-student-id">Student ID</label>
          <input type="text" id="reg-student-id" class="form-input" placeholder="e.g. CS22B001" />
          <span class="field-error" id="reg-student-id-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-department">Department</label>
          <select id="reg-department" class="form-select" required>
            <option value="">Select department</option>
          </select>
          <span class="field-error" id="reg-dept-error" role="alert"></span>
        </div>
        <span class="form-error-global" id="register-error-global" role="alert"></span>
        <button type="submit" class="btn btn-primary btn-full" id="register-submit-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader" aria-hidden="true"></span>
        </button>
      </form>
    </div>
  </div>
</div>
